# -----------------------------------------------
# Apache SSL Frontend — port 443
# Serves static files + proxies PHP to nginx:9999
# -----------------------------------------------
<VirtualHost *:443>
    ServerName galaxy.local
    DocumentRoot /var/www/html

    # TLS Configuration
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/lab.crt
    SSLCertificateKeyFile /etc/ssl/private/lab.key
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256
    SSLHonorCipherOrder   off
    SSLSessionTickets     off

    # Security Headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options           "SAMEORIGIN"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set X-XSS-Protection          "1; mode=block"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy   "default-src 'self' 'unsafe-inline'"

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/galaxy-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/galaxy-ssl-access.log combined
</VirtualHost>

# -----------------------------------------------
# HTTP → HTTPS Redirect
# -----------------------------------------------
<VirtualHost *:80>
    ServerName galaxy.local
    Redirect permanent / https://galaxy.local/
</VirtualHost>
